<!DOCTYPE html>
<html>
<head>
    <title>GitHub Profile Banner Generator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .banner-container {
            width: 1200px;
            height: 400px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        /* Abstract elements */
        .neural-net {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(76, 201, 240, 0.15) 0px, transparent 50px),
                radial-gradient(circle at 80% 70%, rgba(67, 97, 238, 0.15) 0px, transparent 50px),
                radial-gradient(circle at 40% 85%, rgba(114, 9, 183, 0.15) 0px, transparent 50px);
            opacity: 0.6;
        }
        
        .circuit-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(0deg, transparent 49%, rgba(76, 201, 240, 0.1) 50%, transparent 51%),
                linear-gradient(90deg, transparent 49%, rgba(67, 97, 238, 0.1) 50%, transparent 51%);
            background-size: 40px 40px;
            opacity: 0.4;
        }
        
        /* Code elements */
        .code-snippets {
            position: absolute;
            color: rgba(76, 201, 240, 0.7);
            font-family: 'Courier New', monospace;
            font-size: 16px;
            opacity: 0.8;
        }
        
        .code-snippets:nth-child(1) { top: 15%; left: 10%; }
        .code-snippets:nth-child(2) { top: 25%; right: 10%; }
        .code-snippets:nth-child(3) { bottom: 25%; left: 15%; }
        .code-snippets:nth-child(4) { bottom: 15%; right: 12%; }
        
        /* Cloud elements */
        .cloud-icons {
            position: absolute;
            font-size: 32px;
            opacity: 0.2;
            color: #7209b7;
        }
        
        .cloud-icons:nth-child(1) { top: 10%; left: 25%; }
        .cloud-icons:nth-child(2) { top: 75%; right: 25%; }
        .cloud-icons:nth-child(3) { top: 40%; right: 10%; }
        .cloud-icons:nth-child(4) { bottom: 30%; left: 10%; }
        
        /* Main content */
        .main-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            z-index: 10;
        }
        
        .name {
            color: #ffffff;
            font-size: 60px;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(76, 201, 240, 0.8);
            letter-spacing: 2px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        .title {
            color: #4cc9f0;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(67, 97, 238, 0.6);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        /* Animation */
        @keyframes subtlePulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.9; }
            100% { opacity: 0.6; }
        }
        
        .neural-net {
            animation: subtlePulse 6s infinite;
        }
    </style>
</head>
<body>
    <div class="banner-container">
        <div class="neural-net"></div>
        <div class="circuit-lines"></div>
        
        <div class="code-snippets">def ai_engine():</div>
        <div class="code-snippets">return neural_net</div>
        <div class="code-snippets"># software dev</div>
        <div class="code-snippets">class CSEStudent:</div>
        
        <div class="cloud-icons">☁️</div>
        <div class="cloud-icons">☁️</div>
        <div class="cloud-icons">☁️</div>
        <div class="cloud-icons">☁️</div>
        
        <div class="main-content">
            <div class="name">Akhil Senthil</div>
            <div class="title">AI Enthusiast | Software Developer | CSE Undergraduate</div>
        </div>
    </div>
    
    <script>
        // Add click to download functionality
        document.querySelector('.banner-container').addEventListener('click', function() {
            alert('To use this banner:\\n1. Right-click on the banner\\n2. Select "Save image as..."\\n3. Save as banner.png\\n4. Upload to your GitHub repository');
        });
    </script>
</body>
</html>
