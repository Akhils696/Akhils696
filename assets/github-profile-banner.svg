    <radialGradient id="glowPurple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(2390 700) rotate(-22) scale(900 460)">
      <stop stop-color="#7B4DFF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#7B4DFF" stop-opacity="0"/>
