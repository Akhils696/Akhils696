      <stop offset="0.5" stop-color="#0E1330"/>
      <stop offset="1" stop-color="#090E22"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(550 260) rotate(38) scale(820 420)">
      <stop stop-color="#2F7DFF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#2F7DFF" stop-opacity="0"/>
